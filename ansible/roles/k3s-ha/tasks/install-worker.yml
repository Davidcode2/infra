---
# Install k3s agent on worker nodes
# Worker nodes do not run the control plane, only kubelet and container runtime

- name: 1. Get k3s join token from master node
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  delegate_to: "{{ groups['k3s_master_init'][0] }}"
  register: k3s_token_raw

- name: 2. Store k3s token as fact
  ansible.builtin.set_fact:
    k3s_token: "{{ k3s_token_raw['content'] | b64decode | trim }}"

- name: 3. Install k3s agent on worker node
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
    INSTALL_K3S_EXEC="
      agent
      --server https://{{ k3s_init_node_ip }}:6443
      --token {{ k3s_token }}
      --kubelet-arg cloud-provider=external
      --kubelet-arg provider-id=hcloud://{{ hcloud_id }}
    " sh
  args:
    creates: /etc/systemd/system/k3s-agent.service
  environment:
    K3S_URL: "https://{{ k3s_init_node_ip }}:6443"
    K3S_TOKEN: "{{ k3s_token }}"

- name: 4. Ensure k3s-agent service is enabled and started
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: yes
  become: true
