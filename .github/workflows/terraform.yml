      - name: Terraform Init
        run: terraform init
      
      # DISABLED: Terraform Apply - uncomment after verifying plan works correctly
      # - name: Terraform Apply
      #   run: terraform apply -auto-approve -input=false
      
      - name: Terraform Plan Only (Apply Disabled)
        run: |
          echo "⚠️ Apply is currently disabled for safety"
