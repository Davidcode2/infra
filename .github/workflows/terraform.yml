              "schluesselmomente_zoho_verification") tf_var="TF_VAR_schluesselmomente_freiburg_de_zoho_verification_TXT_value" ;;
              "portfolio_netlify_challenge") tf_var="TF_VAR_portfolio_netlify_challenge_txt" ;;
